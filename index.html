<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAI - Premium Workspace</title>
    <style>
        /* Modern ChatGPT / Gemini Premium Dark Glass Theme UI */
        :root {
            --bg-main: #0b0f19;
            --sidebar-bg: #111827;
            --chat-bg: #131c2e;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-glow: #3b82f6;
            --border-color: rgba(255, 255, 255, 0.08);
            --user-bubble: #2563eb;
            --bot-bubble: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* App Window Layout wrapper */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Sidebar mimicking ChatGPT/Gemini History section */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .sidebar { display: none; } /* Mobile optimization */
        }

        .new-chat-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            text-align: left;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Main Workspace Interface */
        .main-chat-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-main);
            position: relative;
        }

        .chat-header {
            height: 60px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 24px;
            justify-content: space-between;
        }

        .model-badge {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-glow);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        /* Chat Threads Space */
        .messages-viewport {
            flex: 1;
            overflow-y: auto;
            padding: 40px 10% 120px 10%;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .msg-row {
            display: flex;
            width: 100%;
            gap: 18px;
        }

        .msg-row.user-variant {
            justify-content: flex-end;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .user-variant .avatar {
            background-color: #4b5563;
            order: 2;
        }

        .bot-variant .avatar {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.4);
        }

        .content-bubble {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 1rem;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .user-variant .content-bubble {
            background-color: var(--user-bubble);
            border-top-right-radius: 2px;
        }

        .bot-variant .content-bubble {
            background-color: var(--bot-bubble);
            border: 1px solid var(--border-color);
            border-top-left-radius: 2px;
        }

        /* Floating Futuristic Input Deck Setup */
        .input-floating-deck {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 24px 10%;
            background: linear-gradient(transparent, var(--bg-main) 40%);
        }

        .input-bar-container {
            background-color: var(--chat-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            display: flex;
            padding: 10px 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .input-bar-container:focus-within {
            border-color: var(--accent-glow);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 1rem;
            resize: none;
            height: 28px;
            font-family: inherit;
            padding-top: 4px;
        }

        .action-send-btn {
            background-color: var(--accent-glow);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
            align-self: flex-end;
        }

        .action-send-btn:hover { opacity: 0.9; }
        .action-send-btn:disabled { background-color: #374151; cursor: not-allowed; }

        .pulse-thinking {
            animation: pulse 1.4s infinite ease-in-out;
            color: var(--text-secondary);
        }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <button class="new-chat-btn" onclick="window.location.reload()">+ New Thread</button>
            <div style="color: var(--text-secondary); font-size: 0.8rem; margin-top: auto;"> v2.5 Stable // Production UI</div>
        </div>

        <div class="main-chat-pane">
            <div class="chat-header">
                <div style="font-weight: 600; font-size: 1.1rem; letter-spacing: 0.5px;">NexusAI Core</div>
                <div class="model-badge">Qwen 2.5 Turbo (Active)</div>
            </div>

            <div class="messages-viewport" id="viewport">
                <div class="msg-row bot-variant">
                    <div class="avatar">AI</div>
                    <div class="content-bubble">Hello! I am your advanced AI workspace interface. Ask me anything to see how fast I process inquiries.</div>
                </div>
            </div>

            <div class="input-floating-deck">
                <div class="input-bar-container">
                    <textarea id="rawInput" placeholder="Message NexusAI..." rows="1"></textarea>
                    <button class="action-send-btn" id="submitButton" onclick="handleMessageTransmission()">➔</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const viewport = document.getElementById('viewport');
        const rawInput = document.getElementById('rawInput');
        const submitButton = document.getElementById('submitButton');

        // ------------------ API CREDENTIALS ------------------
        // Make sure your generated token is inside the quotes below!
        const API_TOKEN = "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";
        
        // This high-speed conversational model is fully supported by the free tier
        const ENDPOINT_URL = "https://api-inference.huggingface.co/models/Qwen/Qwen2.5-Coder-7B-Instruct";
        // -----------------------------------------------------

        async function handleMessageTransmission() {
            const query = rawInput.value.trim();
            if(!query || submitButton.disabled) return;

            // Interface Lock States
            setControlStates(true);
            renderBubble(query, 'user-variant', 'You');
            rawInput.value = '';

            // Generate Thinking Block
            const processingRow = renderBubble('System parsing instructions...', 'bot-variant', 'AI', true);

            try {
                // Safeguard check to remind you about token injection setup
                if(API_TOKEN.includes("PASTE_YOUR_FREE_TOKEN")) {
                    throw new Error("TOKEN_MISSING");
                }

                const networkResponse = await fetch(ENDPOINT_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_TOKEN}`
                    },
                    body: JSON.stringify({
                        inputs: `<|im_start|>user\n${query}<|im_end|>\n<|im_start|>assistant\n`,
                        parameters: { max_new_tokens: 600, temperature: 0.6 }
                    })
                });

                if(!networkResponse.ok) {
                    throw new Error(`HTTP_${networkResponse.status}`);
                }

                const parsedData = await networkResponse.json();
                
                let rawAIOutput = "";
                if (Array.isArray(parsedData)) {
                    rawAIOutput = parsedData[0].generated_text;
                } else {
                    rawAIOutput = parsedData.generated_text;
                }

                // Smooth out the conversational context by removing system tracking strings
                let trueReply = rawAIOutput.split("<|im_start|>assistant\n").pop().replace(/<\|im_end\|>/g, '').trim();

                // Assign raw data straight into target template node element
                const targetedBubble = processingRow.querySelector('.content-bubble');
                targetedBubble.classList.remove('pulse-thinking');
                targetedBubble.innerText = trueReply;

            } catch (error) {
                const errorBubble = processingRow.querySelector('.content-bubble');
                errorBubble.classList.remove('pulse-thinking');
                errorBubble.style.borderColor = "rgba(239, 68, 68, 0.4)";
                errorBubble.style.background = "rgba(239, 68, 68, 0.05)";

                if (error.message === "TOKEN_MISSING") {
                    errorBubble.innerText = "Configuration Error: You haven't added your Hugging Face API key yet. Open the index.html file and paste it into line 133.";
                } else {
                    errorBubble.innerText = "Network Error: Could not reach the model server. Make sure your Token type is explicitly set to 'Read' on Hugging Face and try again.";
                }
            } finally {
                setControlStates(false);
                scrollWindow();
            }
        }

        function renderBubble(msgText, displayClass, signature, isThinking = false) {
            const row = document.createElement('div');
            row.classList.add('msg-row', displayClass);

            const avatar = document.createElement('div');
            avatar.classList.add('avatar');
            avatar.innerText = signature;

            const bubble = document.createElement('div');
            bubble.classList.add('content-bubble');
            if(isThinking) bubble.classList.add('pulse-thinking');
            bubble.innerText = msgText;

            row.appendChild(avatar);
            row.appendChild(bubble);
            viewport.appendChild(row);
            scrollWindow();
            return row;
        }

        function setControlStates(lock) {
            rawInput.disabled = lock;
            submitButton.disabled = lock;
            if(!lock) setTimeout(() => rawInput.focus(), 50);
        }

        function scrollWindow() {
            viewport.scrollTop = viewport.scrollHeight;
        }

        // Send text cleanly if 'Enter' is pressed down natively
        rawInput.addEventListener("keydown", function(e) {
            if(e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                handleMessageTransmission();
            }
        });
    </script>
</body>
</html>
